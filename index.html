*{box-sizing:border-box;margin:0;padding:0}

.gate{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);padding:36px 32px;width:340px;text-align:center}

.gate button:hover:not(:disabled){background:#1F4E79}
.gate button:disabled{background:#a0b8d8;cursor:wait}
.err{color:#dc2626;font-size:12px;margin-top:12px;min-height:16px}
.foot{font-size:11px;color:#bbb;margin-top:18px}
</style>

function b64ToBytes(s){
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr;
}

async function unlock(){
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const code=document.getElementById('code').value;
  if(!code){err.textContent='请输入访问码';return;}
  btn.disabled=true; btn.textContent='验证中…'; err.textContent='';
  try{
    const enc=new TextEncoder();
    const salt=b64ToBytes(PAYLOAD.salt);
    const iv=b64ToBytes(PAYLOAD.iv);
    const ct=b64ToBytes(PAYLOAD.ct);
    const baseKey=await crypto.subtle.importKey('raw',enc.encode(code),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:salt,iterations:PAYLOAD.iter,hash:'SHA-256'},
      baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
    const ptBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
    const html=new TextDecoder().decode(ptBuf);
    // 解密成功：用整份工具替换当前页面
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    btn.disabled=false; btn.textContent='进入工作台';
    err.textContent='访问码错误，请重试';
    document.getElementById('code').value='';
    document.getElementById('code').focus();
  }
}

document.getElementById('btn').addEventListener('click',unlock);
document.getElementById('code').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
